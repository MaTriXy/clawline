apiVersion: ssu/v1
nlu:
  shortcuts:
    bundleIdentifier: co.clicketyclacks.Clawline
    intents:
    - metadata:
        name: SendMessageIntent_0
        title: Send Message
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Tell ${+applicationName} to send a message'
          - '{${+prefix} }Ask ${+applicationName} to send a message'
          - '{${+prefix} }Send a message with ${+applicationName}'
    - metadata:
        name: +negative
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }${+standardAppShortcutNegatives}'
variables:
- name: +applicationName
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
    - Clawline
- name: +prefix
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/prefix/en.yaml
- name: +standardAppShortcutNegatives
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/standardAppShortcutNegatives/en.yaml
